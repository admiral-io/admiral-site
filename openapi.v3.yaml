openapi: 3.1.0
info:
    title: Admiral API
    description: The Admiral REST API for managing applications, infrastructure, and deployments. See https://admiral.io/docs for complete documentation.
paths:
    /api/v1/agent/revisions/{revision_id}/bundle:
        get:
            tags:
                - Clusters
            summary: Retrieve a revision bundle
            description: |-
                The bundle contains pre-rendered Kubernetes manifests (from Helm template,
                 kustomize build, or raw manifests) ready for server-side apply. The agent
                 does not need to render anything -- it applies the bundle as-is.

                 The cluster is identified by the service access token's binding. Returns
                 PERMISSION_DENIED if the revision's target cluster does not match the
                 SAT's cluster binding. Returns NOT_FOUND if the revision does not exist
                 or has been canceled.

                 Scope: `cluster:deploy` | Token types: `sat`
            operationId: ClusterAPI_GetRevisionBundle
            parameters:
                - name: revision_id
                  in: path
                  description: The revision to fetch the bundle for (UUID).
                  required: true
                  schema:
                    type: string
                    title: revision_id
                    format: uuid
                    description: The revision to fetch the bundle for (UUID).
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.GetRevisionBundleResponse'
    /api/v1/agent/revisions/{revision_id}/result:
        post:
            tags:
                - Clusters
            summary: Report revision result
            description: |-
                The cluster is identified by the service access token's binding. Returns
                 PERMISSION_DENIED if the revision's target cluster does not match the
                 SAT's cluster binding.

                 Scope: `cluster:deploy` | Token types: `sat`
            operationId: ClusterAPI_ReportRevisionResult
            parameters:
                - name: revision_id
                  in: path
                  description: The revision being reported on (UUID).
                  required: true
                  schema:
                    type: string
                    title: revision_id
                    format: uuid
                    description: The revision being reported on (UUID).
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                revision_id:
                                    type: string
                                    title: revision_id
                                    format: uuid
                                    description: The revision being reported on (UUID).
                                result:
                                    title: result
                                    description: The result of applying the revision.
                                    $ref: '#/components/schemas/admiral.cluster.v1.RevisionResult'
                            title: ReportRevisionResultRequest
                            required:
                                - result
                            additionalProperties: false
                            description: |-
                                ReportRevisionResultRequest contains the outcome of applying a workload
                                 revision to the cluster.
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.ReportRevisionResultResponse'
    /api/v1/agent/status:
        post:
            tags:
                - Clusters
            summary: Report cluster status
            description: |-
                The cluster is identified by the service access token -- the server resolves the
                 cluster from the SAT's binding. No cluster_id is required in the request.

                 This endpoint is agent-facing and restricted to service access tokens.

                 Scope: `cluster:status` | Token types: `sat`
            operationId: ClusterAPI_ReportClusterStatus
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/admiral.cluster.v1.ReportClusterStatusRequest'
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.ReportClusterStatusResponse'
    /api/v1/applications:
        get:
            tags:
                - Applications
            summary: List applications
            description: 'Scope: `app:read`'
            operationId: ApplicationAPI_ListApplications
            parameters:
                - name: filter
                  in: query
                  description: |-
                    Filter expression to narrow results. Uses the Admiral filter DSL.

                     Syntax: `field['name'] = 'value'` with AND/OR/NOT, comparison operators
                     (=, !=, <, >, <=, >=, ~=), and predicates (IN, BETWEEN, CONTAINS,
                     STARTS_WITH, ENDS_WITH, IS NULL, EXISTS).

                     Filterable fields:
                       - `name` -- filter by application name.
                       - `labels.key` -- filter by label key.

                     Example: `field['name'] = 'inventory-api' AND field['labels.team'] = 'logistics'`
                  schema:
                    type: string
                    title: filter
                    maxLength: 1024
                    description: |-
                        Filter expression to narrow results. Uses the Admiral filter DSL.

                         Syntax: `field['name'] = 'value'` with AND/OR/NOT, comparison operators
                         (=, !=, <, >, <=, >=, ~=), and predicates (IN, BETWEEN, CONTAINS,
                         STARTS_WITH, ENDS_WITH, IS NULL, EXISTS).

                         Filterable fields:
                           - `name` -- filter by application name.
                           - `labels.key` -- filter by label key.

                         Example: `field['name'] = 'inventory-api' AND field['labels.team'] = 'logistics'`
                - name: page_size
                  in: query
                  description: Maximum number of applications to return per page.
                  schema:
                    type: integer
                    title: page_size
                    maximum: 100
                    minimum: 0
                    format: int32
                    description: Maximum number of applications to return per page.
                - name: page_token
                  in: query
                  description: Opaque pagination token from a previous response.
                  schema:
                    type: string
                    title: page_token
                    description: Opaque pagination token from a previous response.
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.application.v1.ListApplicationsResponse'
        post:
            tags:
                - Applications
            summary: Create an application
            description: 'Scope: `app:write`'
            operationId: ApplicationAPI_CreateApplication
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/admiral.application.v1.CreateApplicationRequest'
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.application.v1.CreateApplicationResponse'
    /api/v1/applications/{application.id}:
        patch:
            tags:
                - Applications
            summary: Update an application
            description: 'Scope: `app:write`'
            operationId: ApplicationAPI_UpdateApplication
            parameters:
                - name: application.id
                  in: path
                  description: Unique identifier for the application (UUID).
                  required: true
                  schema:
                    type: string
                    title: id
                    format: uuid
                    description: Unique identifier for the application (UUID).
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                application:
                                    title: application
                                    description: |-
                                        The application with updated fields.
                                         Only fields specified in `update_mask` are updated.
                                    $ref: '#/components/schemas/admiral.application.v1.Application'
                                update_mask:
                                    title: update_mask
                                    description: |-
                                        The set of fields to update. If unset, all mutable fields are updated.
                                         Supported fields: `name`, `description`, `labels`.
                                    $ref: '#/components/schemas/google.protobuf.FieldMask'
                            title: UpdateApplicationRequest
                            required:
                                - application
                            additionalProperties: false
                            description: UpdateApplicationRequest contains the application fields to update.
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.application.v1.UpdateApplicationResponse'
    /api/v1/applications/{application_id}:
        get:
            tags:
                - Applications
            summary: Retrieve an application
            description: 'Scope: `app:read`'
            operationId: ApplicationAPI_GetApplication
            parameters:
                - name: application_id
                  in: path
                  description: The unique identifier of the application (UUID).
                  required: true
                  schema:
                    type: string
                    title: application_id
                    format: uuid
                    description: The unique identifier of the application (UUID).
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.application.v1.GetApplicationResponse'
        delete:
            tags:
                - Applications
            summary: Delete an application
            description: 'Scope: `app:write`'
            operationId: ApplicationAPI_DeleteApplication
            parameters:
                - name: application_id
                  in: path
                  description: The unique identifier of the application to delete (UUID).
                  required: true
                  schema:
                    type: string
                    title: application_id
                    format: uuid
                    description: The unique identifier of the application to delete (UUID).
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.application.v1.DeleteApplicationResponse'
    /api/v1/clusters:
        get:
            tags:
                - Clusters
            summary: List clusters
            description: 'Scope: `cluster:read`'
            operationId: ClusterAPI_ListClusters
            parameters:
                - name: filter
                  in: query
                  description: |-
                    Filter expression to narrow results. Uses the Admiral filter DSL.

                     Syntax: `field['name'] = 'value'` with AND/OR/NOT, comparison operators
                     (=, !=, <, >, <=, >=, ~=), and predicates (IN, BETWEEN, CONTAINS,
                     STARTS_WITH, ENDS_WITH, IS NULL, EXISTS).

                     Filterable fields:
                       - `name` -- filter by cluster name.
                       - `health_status` -- filter by health status.
                       - `labels.key` -- filter by label key.

                     Example: `field['health_status'] = 'HEALTHY' AND field['labels.region'] = 'us-east-1'`
                  schema:
                    type: string
                    title: filter
                    maxLength: 1024
                    description: |-
                        Filter expression to narrow results. Uses the Admiral filter DSL.

                         Syntax: `field['name'] = 'value'` with AND/OR/NOT, comparison operators
                         (=, !=, <, >, <=, >=, ~=), and predicates (IN, BETWEEN, CONTAINS,
                         STARTS_WITH, ENDS_WITH, IS NULL, EXISTS).

                         Filterable fields:
                           - `name` -- filter by cluster name.
                           - `health_status` -- filter by health status.
                           - `labels.key` -- filter by label key.

                         Example: `field['health_status'] = 'HEALTHY' AND field['labels.region'] = 'us-east-1'`
                - name: page_size
                  in: query
                  description: Maximum number of clusters to return per page.
                  schema:
                    type: integer
                    title: page_size
                    maximum: 100
                    minimum: 0
                    format: int32
                    description: Maximum number of clusters to return per page.
                - name: page_token
                  in: query
                  description: Opaque pagination token from a previous response.
                  schema:
                    type: string
                    title: page_token
                    description: Opaque pagination token from a previous response.
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.ListClustersResponse'
        post:
            tags:
                - Clusters
            summary: Create a cluster
            description: |-
                The response includes a `plain_text_token` -- the raw SAT secret shown
                 exactly once. Deploy this token to the K8s agent (e.g., via Helm values
                 or a Kubernetes Secret). The agent uses it to authenticate with
                 AgentAPI.RegisterAgent on first boot.

                 Scope: `cluster:write`
            operationId: ClusterAPI_CreateCluster
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/admiral.cluster.v1.CreateClusterRequest'
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.CreateClusterResponse'
    /api/v1/clusters/{cluster.id}:
        patch:
            tags:
                - Clusters
            summary: Update a cluster
            description: 'Scope: `cluster:write`'
            operationId: ClusterAPI_UpdateCluster
            parameters:
                - name: cluster.id
                  in: path
                  description: Unique identifier for the cluster (UUID).
                  required: true
                  schema:
                    type: string
                    title: id
                    format: uuid
                    description: Unique identifier for the cluster (UUID).
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                cluster:
                                    title: cluster
                                    description: |-
                                        The cluster with updated fields. The `id` field is required.
                                         Only fields specified in `update_mask` are updated.
                                    $ref: '#/components/schemas/admiral.cluster.v1.Cluster'
                                update_mask:
                                    title: update_mask
                                    description: |-
                                        The set of fields to update. If unset, all mutable fields are updated.
                                         Supported fields: `name`, `description`, `labels`.
                                    $ref: '#/components/schemas/google.protobuf.FieldMask'
                            title: UpdateClusterRequest
                            required:
                                - cluster
                            additionalProperties: false
                            description: UpdateClusterRequest contains the cluster fields to update.
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.UpdateClusterResponse'
    /api/v1/clusters/{cluster_id}:
        get:
            tags:
                - Clusters
            summary: Retrieve a cluster
            description: |-
                Returns the Cluster record with its server-derived health_status. For
                 detailed telemetry (node counts, resource usage, workload summary), use
                 GetClusterStatus instead.

                 Scope: `cluster:read`
            operationId: ClusterAPI_GetCluster
            parameters:
                - name: cluster_id
                  in: path
                  description: The unique identifier of the cluster (UUID).
                  required: true
                  schema:
                    type: string
                    title: cluster_id
                    format: uuid
                    description: The unique identifier of the cluster (UUID).
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.GetClusterResponse'
        delete:
            tags:
                - Clusters
            summary: Delete a cluster
            description: 'Scope: `cluster:write`'
            operationId: ClusterAPI_DeleteCluster
            parameters:
                - name: cluster_id
                  in: path
                  description: |-
                    The unique identifier of the cluster to delete (UUID).
                     All associated service access tokens will be revoked.
                  required: true
                  schema:
                    type: string
                    title: cluster_id
                    format: uuid
                    description: |-
                        The unique identifier of the cluster to delete (UUID).
                         All associated service access tokens will be revoked.
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.DeleteClusterResponse'
    /api/v1/clusters/{cluster_id}/status:
        get:
            tags:
                - Clusters
            summary: Retrieve cluster status
            description: |-
                Returns NOT_FOUND if the cluster does not exist. If the cluster exists but
                 no agent has reported telemetry yet, the response will have health_status
                 PENDING and no status message.

                 Scope: `cluster:read`
            operationId: ClusterAPI_GetClusterStatus
            parameters:
                - name: cluster_id
                  in: path
                  description: The unique identifier of the cluster (UUID).
                  required: true
                  schema:
                    type: string
                    title: cluster_id
                    format: uuid
                    description: The unique identifier of the cluster (UUID).
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.GetClusterStatusResponse'
    /api/v1/clusters/{cluster_id}/tokens:
        get:
            tags:
                - Clusters
            summary: List cluster tokens
            description: 'Scope: `cluster:read`'
            operationId: ClusterAPI_ListClusterTokens
            parameters:
                - name: cluster_id
                  in: path
                  description: The cluster to list tokens for (UUID).
                  required: true
                  schema:
                    type: string
                    title: cluster_id
                    format: uuid
                    description: The cluster to list tokens for (UUID).
                - name: filter
                  in: query
                  description: |-
                    Filter expression to narrow results. Uses the Admiral filter DSL.

                     Filterable fields:
                       - `name` -- filter by token name.
                       - `status` -- filter by token status (ACTIVE, REVOKED).

                     Example: `field['status'] = 'ACTIVE'`
                  schema:
                    type: string
                    title: filter
                    maxLength: 1024
                    description: |-
                        Filter expression to narrow results. Uses the Admiral filter DSL.

                         Filterable fields:
                           - `name` -- filter by token name.
                           - `status` -- filter by token status (ACTIVE, REVOKED).

                         Example: `field['status'] = 'ACTIVE'`
                - name: page_size
                  in: query
                  description: Maximum number of tokens to return per page.
                  schema:
                    type: integer
                    title: page_size
                    maximum: 100
                    minimum: 0
                    format: int32
                    description: Maximum number of tokens to return per page.
                - name: page_token
                  in: query
                  description: Opaque pagination token from a previous response.
                  schema:
                    type: string
                    title: page_token
                    description: Opaque pagination token from a previous response.
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.ListClusterTokensResponse'
        post:
            tags:
                - Clusters
            summary: Create a cluster token
            description: |-
                Use this to create additional SATs for an existing cluster (e.g., for
                 zero-downtime token rotation). The initial SAT is created automatically
                 by CreateCluster.

                 Scope: `cluster:write`
            operationId: ClusterAPI_CreateClusterToken
            parameters:
                - name: cluster_id
                  in: path
                  description: The cluster to bind this token to (UUID).
                  required: true
                  schema:
                    type: string
                    title: cluster_id
                    format: uuid
                    description: The cluster to bind this token to (UUID).
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                cluster_id:
                                    type: string
                                    title: cluster_id
                                    format: uuid
                                    description: The cluster to bind this token to (UUID).
                                name:
                                    type: string
                                    title: name
                                    maxLength: 63
                                    minLength: 1
                                    pattern: ^[a-z]([a-z0-9-]{0,61}[a-z0-9])?$
                                    description: |-
                                        URL-safe, human-readable identifier for the token (e.g., "prod-agent-key").
                                         Must be unique within the cluster's tokens. Lowercase alphanumeric and
                                         hyphens only.
                                expires_at:
                                    title: expires_at
                                    description: Optional expiration time. If unset, the token does not expire.
                                    $ref: '#/components/schemas/google.protobuf.Timestamp'
                            title: CreateClusterTokenRequest
                            additionalProperties: false
                            description: |-
                                CreateClusterTokenRequest contains the parameters for creating a new SAT
                                 bound to a cluster.
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.CreateClusterTokenResponse'
    /api/v1/clusters/{cluster_id}/tokens/{token_id}:
        get:
            tags:
                - Clusters
            summary: Retrieve a cluster token
            description: 'Scope: `cluster:read`'
            operationId: ClusterAPI_GetClusterToken
            parameters:
                - name: cluster_id
                  in: path
                  description: The cluster the token belongs to (UUID).
                  required: true
                  schema:
                    type: string
                    title: cluster_id
                    format: uuid
                    description: The cluster the token belongs to (UUID).
                - name: token_id
                  in: path
                  description: The unique identifier of the token (UUID).
                  required: true
                  schema:
                    type: string
                    title: token_id
                    format: uuid
                    description: The unique identifier of the token (UUID).
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.GetClusterTokenResponse'
    /api/v1/clusters/{cluster_id}/tokens/{token_id}/revoke:
        post:
            tags:
                - Clusters
            summary: Revoke a cluster token
            description: 'Scope: `cluster:write`'
            operationId: ClusterAPI_RevokeClusterToken
            parameters:
                - name: cluster_id
                  in: path
                  description: The cluster the token belongs to (UUID).
                  required: true
                  schema:
                    type: string
                    title: cluster_id
                    format: uuid
                    description: The cluster the token belongs to (UUID).
                - name: token_id
                  in: path
                  description: The unique identifier of the token to revoke (UUID).
                  required: true
                  schema:
                    type: string
                    title: token_id
                    format: uuid
                    description: The unique identifier of the token to revoke (UUID).
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                cluster_id:
                                    type: string
                                    title: cluster_id
                                    format: uuid
                                    description: The cluster the token belongs to (UUID).
                                token_id:
                                    type: string
                                    title: token_id
                                    format: uuid
                                    description: The unique identifier of the token to revoke (UUID).
                            title: RevokeClusterTokenRequest
                            additionalProperties: false
                            description: RevokeClusterTokenRequest identifies a cluster SAT to revoke.
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.RevokeClusterTokenResponse'
    /api/v1/clusters/{cluster_id}/workloads:
        get:
            tags:
                - Clusters
            summary: List workloads
            description: 'Scope: `cluster:read`'
            operationId: ClusterAPI_ListWorkloads
            parameters:
                - name: cluster_id
                  in: path
                  description: The cluster whose workloads to list (UUID).
                  required: true
                  schema:
                    type: string
                    title: cluster_id
                    format: uuid
                    description: The cluster whose workloads to list (UUID).
                - name: filter
                  in: query
                  description: |-
                    Filter expression to narrow results. Uses the Admiral filter DSL.

                     Filterable fields:
                       - `namespace` -- filter by Kubernetes namespace.
                       - `kind` -- filter by workload kind (Deployment, StatefulSet, DaemonSet).
                       - `name` -- filter by workload name.
                       - `health_status` -- filter by workload health status.

                     Example: `field['namespace'] = 'production' AND field['health_status'] = 'DEGRADED'`
                  schema:
                    type: string
                    title: filter
                    maxLength: 1024
                    description: |-
                        Filter expression to narrow results. Uses the Admiral filter DSL.

                         Filterable fields:
                           - `namespace` -- filter by Kubernetes namespace.
                           - `kind` -- filter by workload kind (Deployment, StatefulSet, DaemonSet).
                           - `name` -- filter by workload name.
                           - `health_status` -- filter by workload health status.

                         Example: `field['namespace'] = 'production' AND field['health_status'] = 'DEGRADED'`
                - name: page_size
                  in: query
                  description: Maximum number of workloads to return per page.
                  schema:
                    type: integer
                    title: page_size
                    maximum: 100
                    minimum: 0
                    format: int32
                    description: Maximum number of workloads to return per page.
                - name: page_token
                  in: query
                  description: Opaque pagination token from a previous response.
                  schema:
                    type: string
                    title: page_token
                    description: Opaque pagination token from a previous response.
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.ListWorkloadsResponse'
    /api/v1/clusters/{cluster_id}/workloads/status:
        post:
            tags:
                - Clusters
            summary: Report workload status
            description: |-
                This endpoint is agent-facing and restricted to service access tokens.

                 Scope: `cluster:status` | Token types: `sat`
            operationId: ClusterAPI_ReportWorkloadStatus
            parameters:
                - name: cluster_id
                  in: path
                  description: The cluster these workloads belong to (UUID).
                  required: true
                  schema:
                    type: string
                    title: cluster_id
                    format: uuid
                    description: The cluster these workloads belong to (UUID).
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                cluster_id:
                                    type: string
                                    title: cluster_id
                                    format: uuid
                                    description: The cluster these workloads belong to (UUID).
                                workloads:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/admiral.cluster.v1.WorkloadStatus'
                                    title: workloads
                                    description: Per-workload status snapshots.
                                reported_at:
                                    title: reported_at
                                    description: When the agent generated this report.
                                    $ref: '#/components/schemas/google.protobuf.Timestamp'
                            title: ReportWorkloadStatusRequest
                            additionalProperties: false
                            description: ReportWorkloadStatusRequest contains incremental workload telemetry from a K8s agent.
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.cluster.v1.ReportWorkloadStatusResponse'
    /api/v1/components:
        get:
            tags:
                - Components
            summary: List components
            description: |-
                The response behavior depends on the filter:
                   - Filter by `application_id` only: returns application-level component
                     definitions (defaults).
                   - Filter by `application_id` + `environment_id`: returns the resolved
                     view with environment overrides applied. Disabled components are
                     included with `disabled=true`. The `has_override` field indicates
                     whether the component differs from its application-level default.

                 Scope: `app:read`
            operationId: ComponentAPI_ListComponents
            parameters:
                - name: filter
                  in: query
                  description: |-
                    Filter expression using the PEG filter DSL.

                     Common filter fields:
                       - `application_id` -- scope to an application (required for meaningful
