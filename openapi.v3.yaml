                     Filterable fields:
                       - `name` -- filter by source name.
                       - `type` -- filter by source type (TERRAFORM_REGISTRY, HELM_OCI, etc.).
                       - `catalog` -- filter by catalog status (true/false).
                       - `labels.key` -- filter by label key.

                     Example: `field['type'] = 'TERRAFORM_REGISTRY' AND field['catalog'] = 'true'`
                  schema:
                    type: string
                    title: filter
                    maxLength: 1024
                    description: |-
                        Filter expression to narrow results. Uses the Admiral filter DSL.

                         Syntax: `field['name'] = 'value'` with AND/OR/NOT, comparison operators
                         (=, !=, <, >, <=, >=, ~=), and predicates (IN, BETWEEN, CONTAINS,
                         STARTS_WITH, ENDS_WITH, IS NULL, EXISTS).

                         Filterable fields:
                           - `name` -- filter by source name.
                           - `type` -- filter by source type (TERRAFORM_REGISTRY, HELM_OCI, etc.).
                           - `catalog` -- filter by catalog status (true/false).
                           - `labels.key` -- filter by label key.

                         Example: `field['type'] = 'TERRAFORM_REGISTRY' AND field['catalog'] = 'true'`
                - name: page_size
                  in: query
                  description: Maximum number of sources to return per page.
                  schema:
                    type: integer
                    title: page_size
                    maximum: 100
                    minimum: 0
                    format: int32
                    description: Maximum number of sources to return per page.
                - name: page_token
                  in: query
                  description: Opaque pagination token from a previous response.
                  schema:
                    type: string
                    title: page_token
                    description: Opaque pagination token from a previous response.
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.source.v1.ListSourcesResponse'
        post:
            tags:
                - Sources
            summary: Create a source
            description: |-
                The source type and source_config must match -- for example, a
                 TERRAFORM_REGISTRY source requires a TerraformRegistryConfig.

                 Scope: `source:write`
            operationId: SourceAPI_CreateSource
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/admiral.source.v1.CreateSourceRequest'
                required: true
