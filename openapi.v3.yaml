    /api/v1/runner/jobs/{job_id}/state:
        get:
            tags:
                - State
            summary: Retrieve state for a job
            description: |-
                The server validates that the SAT's runner binding matches the runner
                 assigned to this job. Returns PERMISSION_DENIED if they do not match.
                 Returns NOT_FOUND if the job does not exist or has been cancelled.

                 Maps to Terraform HTTP backend GET on the state address.

                 Scope: `state:read` | Token types: `sat`
            operationId: StateAPI_GetState
            parameters:
                - name: job_id
                  in: path
                  description: |-
                    The job to fetch state for (UUID). The server resolves the component
                     and environment from the job's binding.
                  required: true
                  schema:
                    type: string
                    title: job_id
                    format: uuid
                    description: |-
                        The job to fetch state for (UUID). The server resolves the component
                         and environment from the job's binding.
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.state.v1.GetStateResponse'
        post:
            tags:
                - State
            summary: Push state for a job
            description: |-
                The server validates that the SAT's runner binding matches the runner
                 assigned to this job. Returns PERMISSION_DENIED if they do not match.
                 Returns FAILED_PRECONDITION if the serial is not greater than the current
                 serial. Returns INVALID_ARGUMENT if the lineage does not match the
                 existing state record.

                 Maps to Terraform HTTP backend POST on the state address.

                 Scope: `state:write` | Token types: `sat`
            operationId: StateAPI_PushState
            parameters:
                - name: job_id
                  in: path
                  description: The job pushing state (UUID).
                  required: true
                  schema:
                    type: string
                    title: job_id
                    format: uuid
                    description: The job pushing state (UUID).
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                job_id:
                                    type: string
                                    title: job_id
                                    format: uuid
                                    description: The job pushing state (UUID).
                                data:
                                    type: string
                                    title: data
                                    maxLength: 67108864
                                    minLength: 1
                                    format: byte
                                    description: The raw Terraform state data (JSON-encoded). Maximum 64 MiB.
                                md5:
                                    type: string
                                    title: md5
                                    minLength: 1
                                    description: MD5 hash of the state data.
                                serial:
                                    type:
                                        - integer
                                        - string
                                    title: serial
                                    format: int64
                                    description: Terraform state serial number. Must be greater than the current serial.
                                lineage:
                                    type: string
                                    title: lineage
                                    minLength: 1
                                    description: |-
                                        Terraform state lineage. Must match the existing lineage if the state
                                         record already exists.
                            title: PushStateRequest
                            additionalProperties: false
                            description: PushStateRequest stores a new state version.
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.state.v1.PushStateResponse'
    /api/v1/runner/jobs/{job_id}/state/lock:
        post:
            tags:
                - State
            summary: Lock state for a job
            description: |-
                The server validates that the SAT's runner binding matches the runner
                 assigned to this job. Returns PERMISSION_DENIED if they do not match.
                 Returns FAILED_PRECONDITION if the state is already locked by a different
                 operation. The lock_id is generated by Terraform and must be passed to
                 UnlockState.

                 Maps to Terraform HTTP backend POST on the lock address.

                 Scope: `state:write` | Token types: `sat`
            operationId: StateAPI_LockState
            parameters:
                - name: job_id
                  in: path
                  description: The job requesting the lock (UUID).
                  required: true
                  schema:
                    type: string
                    title: job_id
                    format: uuid
                    description: The job requesting the lock (UUID).
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                job_id:
                                    type: string
                                    title: job_id
                                    format: uuid
                                    description: The job requesting the lock (UUID).
                                lock_id:
                                    type: string
                                    title: lock_id
                                    format: uuid
                                    description: Terraform-generated lock ID (UUID).
                                operation:
                                    type: string
                                    title: operation
                                    description: The Terraform operation requesting the lock.
                                who:
                                    type: string
                                    title: who
                                    description: Identifier of who is requesting the lock.
                                version:
                                    type: string
                                    title: version
                                    description: Terraform/OpenTofu version of the client requesting the lock.
                            title: LockStateRequest
                            additionalProperties: false
                            description: LockStateRequest acquires an exclusive lock on the job's state.
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.state.v1.LockStateResponse'
    /api/v1/runner/jobs/{job_id}/state/unlock:
        post:
            tags:
                - State
            summary: Unlock state for a job
            description: |-
                The server validates that the SAT's runner binding matches the runner
                 assigned to this job. Returns PERMISSION_DENIED if they do not match.
                 Returns FAILED_PRECONDITION if the lock_id does not match the currently
                 held lock. Returns NOT_FOUND if no lock is held.

                 Maps to Terraform HTTP backend POST on the unlock address.

                 Scope: `state:write` | Token types: `sat`
            operationId: StateAPI_UnlockState
            parameters:
                - name: job_id
                  in: path
                  description: The job releasing the lock (UUID).
                  required: true
                  schema:
                    type: string
                    title: job_id
                    format: uuid
                    description: The job releasing the lock (UUID).
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                job_id:
                                    type: string
                                    title: job_id
                                    format: uuid
                                    description: The job releasing the lock (UUID).
                                lock_id:
                                    type: string
                                    title: lock_id
                                    format: uuid
                                    description: The lock_id to release (UUID). Must match the currently held lock.
                            title: UnlockStateRequest
                            additionalProperties: false
                            description: UnlockStateRequest releases the lock on the job's state.
                required: true
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.state.v1.UnlockStateResponse'
