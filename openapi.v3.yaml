    /auth/callback:
        get:
            tags:
                - Authentication
            summary: OAuth2 callback
            description: |-
                Callback handles the OAuth2 authorization code callback from the IdP.
                 Validates the state nonce, exchanges the code for tokens, creates or
                 updates the user, and establishes a server-side session.
            operationId: AuthenticationAPI_Callback
            parameters:
                - name: code
                  in: query
                  description: The authorization code from the IdP.
                  schema:
                    type: string
                    title: code
                    description: The authorization code from the IdP.
                - name: state
                  in: query
                  description: The state nonce (signed JWT) from the login request.
                  schema:
                    type: string
                    title: state
                    description: The state nonce (signed JWT) from the login request.
                - name: error
                  in: query
                  description: OAuth error code (set by IdP on failure).
                  schema:
                    type: string
                    title: error
                    description: OAuth error code (set by IdP on failure).
                - name: error_description
                  in: query
                  description: Human-readable error description from the IdP.
                  schema:
                    type: string
                    title: error_description
                    description: Human-readable error description from the IdP.
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.authentication.v1.CallbackResponse'
    /auth/login:
        get:
            tags:
                - Authentication
            summary: Initiate OAuth2 login
            description: |-
                Login initiates the OAuth2 authorization code flow. Generates a signed
                 state nonce and returns the IdP authorization URL for the client to
                 redirect to.
            operationId: AuthenticationAPI_Login
            parameters:
                - name: redirect_url
                  in: query
                  description: |-
                    The URL to redirect to after successful authentication. Must be a relative
                     path (no scheme or host). Baked into the signed state nonce.
                  schema:
                    type: string
                    title: redirect_url
                    description: |-
                        The URL to redirect to after successful authentication. Must be a relative
                         path (no scheme or host). Baked into the signed state nonce.
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/admiral.authentication.v1.LoginResponse'
components:
    schemas:
        admiral.application.v1.Application:
            type: object
            properties:
                id:
                    type: string
                    title: id
                    format: uuid
                    description: Unique identifier for the application (UUID).
                name:
                    type: string
                    title: name
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z]([a-z0-9-]{0,61}[a-z0-9])?$
                    description: |-
                        URL-safe, human-readable identifier (e.g., "inventory-api"). Unique within
                         the tenant. Lowercase alphanumeric and hyphens only, must start with a
                         letter and end with an alphanumeric character (1-63 chars).
                description:
                    type: string
                    title: description
                    maxLength: 1024
                    description: |-
                        Optional longer-form description of the application's purpose
                         (e.g., "Core inventory service tracking warehouse stock and fulfillment").
                labels:
                    type: object
                    title: labels
                    maxProperties: 64
                    additionalProperties:
                        type: string
                        title: value
                        maxLength: 256
                    description: |-
                        Arbitrary key-value labels for organizing and filtering applications
                         (e.g., `{"team": "logistics", "tier": "critical"}`).
                created_by:
                    title: created_by
                    description: The user or agent who created this application (server-populated from token).
                    $ref: '#/components/schemas/admiral.common.v1.ActorRef'
                updated_by:
                    title: updated_by
                    description: The user or agent who last updated this application (server-populated from token).
                    $ref: '#/components/schemas/admiral.common.v1.ActorRef'
                created_at:
                    title: created_at
                    description: When the application was created.
                    $ref: '#/components/schemas/google.protobuf.Timestamp'
                updated_at:
                    title: updated_at
                    description: When the application was last updated.
                    $ref: '#/components/schemas/google.protobuf.Timestamp'
            title: Application
            additionalProperties: false
            description: |-
                Application represents a deployable unit within a tenant. An application
                 groups manifests, dependencies, and environment configuration into a single
                 entity that Admiral orchestrates across environments.
            example:
                id: "a1b2c3d4-5678-9abc-def0-1234567890ab"
                name: "inventory-api"
                description: "Core inventory management service for tracking warehouse stock levels and fulfillment."
                labels:
                    team: "logistics"
                    tier: "critical"
                created_by: "d290f1ee-6c54-4b01-90e6-d701748f0851"
                updated_by: "d290f1ee-6c54-4b01-90e6-d701748f0851"
                created_at: "2025-09-15T10:30:00Z"
                updated_at: "2025-11-02T14:22:00Z"
        admiral.application.v1.Application.LabelsEntry:
            type: object
            properties:
                key:
                    type: string
                    title: key
                value:
                    type: string
                    title: value
            title: LabelsEntry
            additionalProperties: false
        admiral.application.v1.CreateApplicationRequest:
            type: object
            properties:
                name:
                    type: string
                    title: name
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z]([a-z0-9-]{0,61}[a-z0-9])?$
                    description: |-
                        URL-safe, human-readable identifier (e.g., "inventory-api"). Must be unique
                         within the tenant. Lowercase alphanumeric and hyphens only.
                description:
                    type:
                        - string
                        - "null"
                    title: description
                    maxLength: 1024
                    description: Optional longer-form description of the application's purpose.
                labels:
                    type: object
                    title: labels
                    maxProperties: 64
                    additionalProperties:
                        type: string
                        title: value
                        maxLength: 256
                    description: Arbitrary key-value labels for organizing and filtering applications.
            title: CreateApplicationRequest
            additionalProperties: false
            description: CreateApplicationRequest contains the parameters for creating a new application.
        admiral.application.v1.CreateApplicationRequest.LabelsEntry:
            type: object
            properties:
                key:
                    type: string
                    title: key
                value:
                    type: string
                    title: value
            title: LabelsEntry
            additionalProperties: false
        admiral.application.v1.CreateApplicationResponse:
            type: object
            properties:
                application:
                    title: application
                    description: The created application.
                    $ref: '#/components/schemas/admiral.application.v1.Application'
            title: CreateApplicationResponse
            additionalProperties: false
            description: CreateApplicationResponse contains the newly created application.
        admiral.application.v1.DeleteApplicationRequest:
            type: object
            properties:
                application_id:
                    type: string
                    title: application_id
                    format: uuid
                    description: The unique identifier of the application to delete (UUID).
            title: DeleteApplicationRequest
            additionalProperties: false
            description: DeleteApplicationRequest identifies an application to delete.
        admiral.application.v1.DeleteApplicationResponse:
            type: object
            title: DeleteApplicationResponse
            additionalProperties: false
            description: DeleteApplicationResponse is empty on success.
        admiral.application.v1.GetApplicationRequest:
            type: object
            properties:
                application_id:
                    type: string
                    title: application_id
                    format: uuid
                    description: The unique identifier of the application (UUID).
            title: GetApplicationRequest
            additionalProperties: false
            description: GetApplicationRequest identifies an application to retrieve.
        admiral.application.v1.GetApplicationResponse:
            type: object
            properties:
                application:
                    title: application
                    description: The application record.
                    $ref: '#/components/schemas/admiral.application.v1.Application'
            title: GetApplicationResponse
            additionalProperties: false
            description: GetApplicationResponse contains the application record.
        admiral.application.v1.ListApplicationsRequest:
            type: object
            properties:
                filter:
                    type: string
                    title: filter
                    maxLength: 1024
                    description: |-
                        Filter expression to narrow results. Uses the Admiral filter DSL.

                         Syntax: `field['name'] = 'value'` with AND/OR/NOT, comparison operators
                         (=, !=, <, >, <=, >=, ~=), and predicates (IN, BETWEEN, CONTAINS,
                         STARTS_WITH, ENDS_WITH, IS NULL, EXISTS).

                         Filterable fields:
                           - `name` -- filter by application name.
                           - `labels.key` -- filter by label key.

                         Example: `field['name'] = 'inventory-api' AND field['labels.team'] = 'logistics'`
                page_size:
                    type: integer
                    title: page_size
                    maximum: 100
                    minimum: 0
                    format: int32
                    description: Maximum number of applications to return per page.
                page_token:
                    type: string
                    title: page_token
                    description: Opaque pagination token from a previous response.
            title: ListApplicationsRequest
            additionalProperties: false
            description: ListApplicationsRequest contains pagination and filter parameters.
        admiral.application.v1.ListApplicationsResponse:
            type: object
            properties:
                applications:
                    type: array
                    items:
                        $ref: '#/components/schemas/admiral.application.v1.Application'
                    title: applications
                    description: The list of applications.
                next_page_token:
                    type: string
                    title: next_page_token
                    description: Pagination token for the next page. Empty when there are no more results.
            title: ListApplicationsResponse
            additionalProperties: false
            description: ListApplicationsResponse contains a page of applications.
        admiral.application.v1.UpdateApplicationRequest:
            type: object
            properties:
                application:
                    title: application
                    description: |-
                        The application with updated fields.
                         Only fields specified in `update_mask` are updated.
                    $ref: '#/components/schemas/admiral.application.v1.Application'
                update_mask:
                    title: update_mask
                    description: |-
                        The set of fields to update. If unset, all mutable fields are updated.
                         Supported fields: `name`, `description`, `labels`.
                    $ref: '#/components/schemas/google.protobuf.FieldMask'
            title: UpdateApplicationRequest
            required:
                - application
            additionalProperties: false
            description: UpdateApplicationRequest contains the application fields to update.
        admiral.application.v1.UpdateApplicationResponse:
            type: object
            properties:
                application:
                    title: application
                    description: The updated application.
                    $ref: '#/components/schemas/admiral.application.v1.Application'
            title: UpdateApplicationResponse
            additionalProperties: false
            description: UpdateApplicationResponse contains the updated application.
        admiral.authentication.v1.CallbackRequest:
            type: object
            properties:
                code:
                    type: string
                    title: code
                    description: The authorization code from the IdP.
                state:
                    type: string
                    title: state
                    description: The state nonce (signed JWT) from the login request.
                error:
                    type: string
                    title: error
                    description: OAuth error code (set by IdP on failure).
                error_description:
                    type: string
                    title: error_description
                    description: Human-readable error description from the IdP.
            title: CallbackRequest
            additionalProperties: false
            description: CallbackRequest contains the OAuth2 callback parameters from the IdP.
        admiral.authentication.v1.CallbackResponse:
            type: object
            title: CallbackResponse
            additionalProperties: false
            description: |-
                CallbackResponse is empty on success. The server sets a session cookie
                 and redirects the browser to the original redirect_url.
        admiral.authentication.v1.LoginRequest:
            type: object
            properties:
                redirect_url:
                    type: string
                    title: redirect_url
                    description: |-
                        The URL to redirect to after successful authentication. Must be a relative
                         path (no scheme or host). Baked into the signed state nonce.
            title: LoginRequest
            additionalProperties: false
            description: LoginRequest contains parameters for initiating the OAuth2 flow.
        admiral.authentication.v1.LoginResponse:
            type: object
            properties:
                auth_url:
                    type: string
                    title: auth_url
                    description: The IdP authorization URL. The client should redirect the browser here.
            title: LoginResponse
            additionalProperties: false
            description: LoginResponse contains the IdP authorization URL for the client to redirect to.
        admiral.cluster.v1.Cluster:
