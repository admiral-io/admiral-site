                updated_by: "d290f1ee-6c54-4b01-90e6-d701748f0851"
                created_at: "2025-07-20T14:00:00Z"
                updated_at: "2025-10-15T10:30:00Z"
                last_tested_at: "2025-11-01T08:00:00Z"
