tags:
    - name: Applications
      description: Manage application lifecycle and configuration.
    - name: Clusters
      description: Manage Kubernetes clusters, service access tokens, and workload telemetry.
    - name: Components
      description: Manage application components and environment overrides.
    - name: Connections
      description: Manage credentials for accessing external systems.
    - name: Deployments
      description: Manage deployments and track component revisions.
    - name: Environments
      description: Manage deployment target environments.
    - name: Runners
      description: Manage infrastructure runners, tokens, and job execution.
    - name: Sources
      description: Manage source definitions for external artifacts.
    - name: State
      description: Manage Terraform state for infrastructure components.
    - name: User
      description: Retrieve user profile and manage personal access tokens.
    - name: Variables
      description: Manage configuration variables across scopes.
