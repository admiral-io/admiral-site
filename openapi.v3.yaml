        post:
            tags:
                - Runners
            summary: Create a runner token
            description: |-
                Use this to create additional SATs for an existing runner (e.g., for
                 zero-downtime token rotation). The initial SAT is created automatically
                 by CreateRunner.

                 Scope: `runner:write`
            operationId: RunnerAPI_CreateRunnerToken
            parameters:
                - name: runner_id
                  in: path
                  description: The runner to bind this token to (UUID).
                  required: true
                  schema:
                    type: string
                    title: runner_id
                    format: uuid
                    description: The runner to bind this token to (UUID).
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                runner_id:
                                    type: string
                                    title: runner_id
                                    format: uuid
                                    description: The runner to bind this token to (UUID).
                                name:
                                    type: string
                                    title: name
                                    maxLength: 63
                                    minLength: 1
                                    pattern: ^[a-z]([a-z0-9-]{0,61}[a-z0-9])?$
                                    description: |-
                                        URL-safe, human-readable identifier for the token (e.g., "prod-runner-key").
